name: Deploy Production

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "configs/**"
      - ".github/workflows/deploy-production.yml"
      - ".github/scripts/deploy-production-remote.sh"
  workflow_dispatch:

env:
  VPS_HOST: ${{ secrets.VPS_HOST }}
  VPS_USER: ${{ secrets.VPS_USER }}
  DOMAIN: www.ultrazend.com.br

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment:
      name: production
      url: https://www.ultrazend.com.br
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SSH tools
        shell: bash
        run: |
          set -eo pipefail
          SERVER_IP="${VPS_HOST:-72.60.10.108}"
          install -m 700 -d "$HOME/.ssh"
          sudo apt-get update
          sudo apt-get install -y sshpass
          ssh-keyscan -H "$SERVER_IP" >> "$HOME/.ssh/known_hosts"

      - name: Test SSH connection
        shell: bash
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          set -eo pipefail
          SERVER_IP="${VPS_HOST:-72.60.10.108}"
          SERVER_USER="${VPS_USER:-root}"
          SERVER_HOST="${SERVER_USER}@${SERVER_IP}"
          if [ -z "$SSHPASS" ]; then
            echo "ERROR: secret VPS_PASSWORD is empty or not configured."
            exit 1
          fi
          sshpass -e ssh \
            -o ConnectTimeout=20 \
            -o PreferredAuthentications=password \
            -o PubkeyAuthentication=no \
            -o StrictHostKeyChecking=yes \
            "$SERVER_HOST" \
            "echo SSH_OK"

      - name: Deploy via SSH
        shell: bash
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          set -eo pipefail
          SERVER_IP="${VPS_HOST:-72.60.10.108}"
          SERVER_USER="${VPS_USER:-root}"
          SERVER_HOST="${SERVER_USER}@${SERVER_IP}"
          sshpass -e ssh \
            -o ConnectTimeout=20 \
            -o PreferredAuthentications=password \
            -o PubkeyAuthentication=no \
            -o StrictHostKeyChecking=yes \
            "$SERVER_HOST" \
            'bash -s' < .github/scripts/deploy-production-remote.sh

      - name: Deploy Complete
        run: |
          SERVER_IP="${VPS_HOST:-72.60.10.108}"
          SERVER_USER="${VPS_USER:-root}"
          echo "Deploy completed"
          echo "Site: https://${{ env.DOMAIN }}"
          echo "Server: ${SERVER_USER}@${SERVER_IP}"
